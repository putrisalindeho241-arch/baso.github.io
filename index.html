<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakso Barokah Bitung | Premium Taste</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --gold: #d4af37;
            --dark-red: #8b0000;
            --black: #0d0d0d;
            --glass: rgba(255, 255, 255, 0.05);
            --transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--black);
            color: #ffffff;
            line-height: 1.6;
        }

        /* --- NAVIGATION --- */
        nav {
            position: fixed;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--gold);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
            font-weight: bold;
        }

        nav ul {
            display: flex;
            list-style: none;
        }

        nav ul li { margin-left: 30px; }

        nav ul li a {
            text-decoration: none;
            color: white;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: var(--transition);
        }

        nav ul li a:hover { color: var(--gold); }

        /* --- HERO SECTION --- */
        #home {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.8)), 
                        url('https://share.google/images/1WTHOSy1BVXuezRwL');
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3rem, 8vw, 5.5rem);
            color: var(--gold);
            margin-bottom: 10px;
        }

        .hero-tagline {
            font-size: 1rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* --- ABOUT SECTION --- */
        #about {
            padding: 100px 10%;
            display: flex;
            align-items: center;
            gap: 50px;
            flex-wrap: wrap;
        }

        .about-img {
            flex: 1;
            min-width: 350px;
            border: 5px solid var(--gold);
            padding: 10px;
        }

        .about-img img {
            width: 100%;
            display: block;
        }

        .about-text { flex: 1; min-width: 350px; }

        .about-text h2 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 20px;
            color: var(--gold);
        }

        /* --- MENU SECTION --- */
        #menu {
            padding: 100px 5%;
            background: #141414;
        }
